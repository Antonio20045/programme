# =============================================================================
# KI-Assistent — Docker Compose
# =============================================================================
# Usage:
#   cp docker/env-example .env     # fill in your API keys + DB password
#   docker compose up -d           # start postgres + gateway
#   docker compose logs -f         # follow logs
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ki_assistent
      POSTGRES_USER: ki_assistent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ki_assistent"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    image: ki-assistent-gateway:local
    container_name: ki-assistent-gateway
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DATABASE_URL=postgresql://ki_assistent:${POSTGRES_PASSWORD}@postgres:5432/ki_assistent
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - gateway-config:/home/node/.openclaw
      - gateway-workspace:/home/node/.openclaw/workspace
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    command: >
      node openclaw.mjs gateway
      --allow-unconfigured
      --bind ${GATEWAY_BIND:-lan}

volumes:
  gateway-config:
  gateway-workspace:
  pgdata:
